<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>innerverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Paytone+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background-color: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14pt;
    }

    body {
      padding: 2rem;
      background-image: url("brot2.png");
    }

    h1 {
      font-family: 'Paytone One', sans-serif;
      font-weight: 400;
      text-align: left;
      line-height: 1;
    }

    p {
      margin-top: 1rem;
      font-size: 14pt;
      font-weight: 400;
    }

    .container {
      container-type: inline-size;
      width: 100%; /* Or any width you want */
    }

    .container h1 {
      font-size: clamp(2rem, 10cqw, 4rem); 
      white-space: nowrap;
    }
    .container p {
      font-size: clamp(10px, 2cqw, 1rem);
    }
  </style>
</head>
<body>
  <span class="container"><h1>innerverse</h1></span>
  <span class="container"><p>coming soon to a nearby galaxy</p></span>
</body>
</html>
